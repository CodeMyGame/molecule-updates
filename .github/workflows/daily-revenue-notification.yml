name: Daily Revenue Notification

on:
  schedule:
    # 04:00 UTC is 09:30 AM IST (Indian Standard Time)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Script Dependencies
        run: npm install firebase-admin web-push

      - name: Send Daily Notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node web-dashboard/scripts/notify.mjs
